<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상하이 가이드</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #f4f4f4; }
        .card { background: white; padding: 20px; margin: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .label { font-size: 14px; color: #888; margin-top: 10px; }
        .data { font-size: 20px; font-weight: bold; padding: 8px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 2px solid #333; }
        .footer button { flex: 1; padding: 20px; border: none; font-size: 18px; font-weight: bold; background: white; cursor: pointer; }
        .footer button.active { background: #333; color: white; }
    </style>
</head>
<body>
    <div id="app"></div>
    <footer class="footer">
        <button id="btn-hotel" onclick="render('hotel')">숙소</button>
        <button id="btn-tour" onclick="render('tour')">관광지</button>
        <button id="btn-restaurant" onclick="render('restaurant')">식당</button>
    </footer>

    <script src="data/hotel.js"></script>
    <script src="data/tour.js"></script>
    <script src="data/restaurant.js"></script>

    <script>
        // 나중에 메뉴(menu), 회화(conv) 데이터가 생기면 여기만 추가하면 됨
        const CONFIG = {
            hotel: { data: hotelData, id: 'btn-hotel' },
            tour: { data: tourData, id: 'btn-tour' },
            restaurant: { data: restaurantData, id: 'btn-restaurant' }
        };

        function copy(text) { 
            navigator.clipboard.writeText(text); 
            alert("복사 완료: " + text); 
        }

        function getCnSub(text) { 
            const match = text.match(/\((.*?)\)/);
            return match ? match[1] : text; 
        }

        function render(type) {
            const config = CONFIG[type];
            if (!config) return;

            // 버튼 활성화 스타일
            document.querySelectorAll('.footer button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(config.id).classList.add('active');

            // 리스트 렌더링
            document.getElementById('app').innerHTML = config.data.map(i => `
                <div class="card">
                    <div class="label">명칭</div>
                    <div class="data" onclick="copy('${i.cn}')">${i.kr}<br><small style="color:blue">${i.cn}</small></div>
                    <div class="label">주소</div>
                    <div class="data" onclick="copy('${i.addr}')">${i.addr}</div>
                    <div class="label">지하철역 (클릭 시 중국어 복사)</div>
                    <div class="data" onclick="copy('${getCnSub(i.sub)}')">${i.sub}</div>
                </div>
            `).join('');
        }

        render('hotel'); // 초기 로드
    </script>
</body>
</html>
