<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>상하이 여행 가이드</title>

    <!-- 아이콘 설정 추가 -->
    <link rel="icon" href="icon.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json"> <!-- PWA 설정 -->
    </head>
<body>
    <div id="toast" class="toast"></div> <!-- 토스트 알림용 -->
    <div id="menu-depth2"></div>
    <div id="menu-depth3"></div>
    <div id="app"></div>

    <footer class="footer">
        <button id="btn-loc" onclick="showLocationTab(this)">위치</button>
        <button id="btn-menu" onclick="showMenuTab(this)">메뉴</button>
        <button id="btn-calc" onclick="showCalcTab(this)">계산기</button>
        <button id="btn-talk" onclick="showTalkTab(this)">회화</button>
        <button id="btn-info" onclick="showInfoTab(this)">정보</button>
    </footer>

    <!-- 데이터 파일들 로드 부분 -->
    <script src="data/hotel.js"></script>
    <script src="data/tour.js"></script>
    <script src="data/restaurant.js"></script>
    <script src="data/others.js"></script>
    <script src="data/menu_data.js"></script>
    <script src="data/talk.js"></script>
    <script src="data/schedule.js"></script>
    <!-- 로직 파일 -->
    <script src="script.js"></script>

    <!-- 이미지 확대용 모달 추가 -->
    <div id="image-modal" class="image-zoom-modal" onclick="closeZoom()">
        <div class="close-zoom-btn">&times;</div>
        <img id="modal-img" class="zoom-content">
    </div>

    <!-- 서비스 워커 등록 (오프라인 캐싱 활성화) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.warn('SW 등록 실패:', err);
                });
            });
        }
    </script>
</body>
</html>
